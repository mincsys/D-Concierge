interface:
  display_name: "成果物レビュー"
  short_description: "skillsで作られた文書・実装・テスト・証跡をレビューし指摘を保存する"
  default_prompt: "$review-artifacts を使って、指定した成果物を関連資料と作成元スキルのチェックリストに照らしてレビューしてください。使用するチェックリストは .tmp/review/ または指定された作業用 checklist 保存先へコピーし、各項目に検証結果と確認根拠を記録してください。指摘は既定の .issue/review/ または指定された指摘保存先へ 1 指摘 1 ファイルで保存してください。"
