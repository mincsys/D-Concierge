approval_policy = "never"
sandbox_mode = "workspace-write"
model = "gpt-5.5"
model_reasoning_effort = "medium"

# web search を使わせない
web_search = "disabled"

# Codex が実行する shell command のネットワークアクセスを禁止
[sandbox_workspace_write]
network_access = false

# API key などを Codex が起動する subprocess に渡さない
[shell_environment_policy]
inherit = "none"
include_only = [
  "PATH",
  "HOME",
  "CODEX_HOME",
  "LANG",
  "LC_ALL",
  "PYTHONPATH",
  "PYTHONUNBUFFERED",
  "XDG_CACHE_HOME",
  "MPLCONFIGDIR"
]

[projects."/workspace"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 4

